name: Deploy Hermes Bot

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Test bot import
      run: |
        python -c "from hermes import *; print('✅ Bot imports OK')"
    
    - name: Verify bot token
      run: |
        curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/getMe" | python -c "import sys,json; d=json.load(sys.stdin); print('✅ Bot:', d['result']['username'])"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: false  # Disable auto-deploy, use Railway/Render for persistent hosting
    steps:
    - name: Deploy to Railway
      run: |
        echo "For persistent hosting, deploy to Railway or Render"
        echo "Guide: https://github.com/Finish-Him/hermes-bot#deploying"

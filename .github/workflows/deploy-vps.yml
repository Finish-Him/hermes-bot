name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-kvm1:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to KVM1 (Detran)
      env:
        VPS_HOST: 187.77.37.158
        VPS_USER: root
        DEPLOY_KEY: ${{ secrets.VPS_DEPLOY_KEY }}
      run: |
        echo "$DEPLOY_KEY" > /tmp/deploy_key
        chmod 600 /tmp/deploy_key
        mkdir -p ~/.ssh
        ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
        ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key $VPS_USER@$VPS_HOST "
          cd /opt/hermes-bot
          git pull origin main
          systemctl restart hermes-bot
          echo '✅ KVM1 Deployed!'
          systemctl status hermes-bot --no-pager -n 3
        "

  # KVM2 requires manual deploy (no IPv6 from GitHub Actions)
  # Run from local terminal:
  # ssh -6 -o StrictHostKeyChecking=no -i ~/.ssh/msc/kvm2_ed25519 root@2a02:4780:2d:e531::1
  # cd /opt/hermes-bot && git pull origin main && systemctl restart hermes-bot

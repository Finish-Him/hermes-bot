name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-kvm1:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to KVM1 (Detran)
      env:
        VPS_HOST: 187.77.37.158
        VPS_USER: root
        DEPLOY_KEY: ${{ secrets.VPS_DEPLOY_KEY }}
      run: |
        echo "$DEPLOY_KEY" > /tmp/deploy_key
        chmod 600 /tmp/deploy_key
        mkdir -p ~/.ssh
        ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
        ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key $VPS_USER@$VPS_HOST "
          cd /opt/hermes-bot
          git pull origin main
          systemctl restart hermes-bot
          echo '✅ KVM1 Deployed!'
        "

  deploy-kvm2:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to KVM2 (MSC) via IPv6
      env:
        VPS_HOST: 2a02:4780:2d:e531::1
        VPS_USER: root
        DEPLOY_KEY: ${{ secrets.KVM2_DEPLOY_KEY }}
      run: |
        echo "$DEPLOY_KEY" > /tmp/deploy_key
        chmod 600 /tmp/deploy_key
        mkdir -p ~/.ssh
        # Add both IPv4 and IPv6 to known_hosts
        ssh-keyscan -H srv1654842.hstgr.cloud >> ~/.ssh/known_hosts 2>/dev/null || true
        ssh-keyscan -H 2a02:4780:2d:e531::1 >> ~/.ssh/known_hosts 2>/dev/null || true
        # Try with IPv6 address
        ssh -6 -o StrictHostKeyChecking=no -o ConnectTimeout=30 -i /tmp/deploy_key $VPS_USER@$VPS_HOST "
          cd /opt/hermes-bot
          git pull origin main
          systemctl restart hermes-bot
          echo '✅ KVM2 Deployed!'
        "

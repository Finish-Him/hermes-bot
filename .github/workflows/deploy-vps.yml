name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to KVM1
      env:
        VPS_HOST: 187.77.37.158
        VPS_USER: root
        DEPLOY_KEY: ${{ secrets.VPS_DEPLOY_KEY }}
      run: |
        echo "$DEPLOY_KEY" > /tmp/deploy_key
        chmod 600 /tmp/deploy_key
        
        mkdir -p ~/.ssh
        ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null
        
        ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key $VPS_USER@$VPS_HOST "
          cd /opt/hermes-bot
          git pull origin main
          systemctl restart hermes-bot
          echo '✅ Deployed from GitHub Actions!'
          systemctl status hermes-bot --no-pager -n 3
        "
